<div class="ds-panel">
  <div class="ds-card" style="padding:0;overflow:hidden">
    <div class="ds-group-header"><span class="ds-group-header__label">Z-Index Scale</span></div>
    @for (z of zIndices; track z.token) {
      <div class="ds-token-row">
        <div class="ds-token-cell">
          <code class="ds-token-name">{{ z.label }}</code>
          <span class="ds-token-raw">{{ z.raw }}</span>
        </div>
        <div class="ds-token-preview" style="gap:var(--spacing-sm)">
          <div class="z-track">
            <div class="z-fill" [style.width]="barWidth(z.raw)"></div>
          </div>
        </div>
        <span class="z-desc">{{ z.use }}</span>
      </div>
    }
  </div>
</div>
