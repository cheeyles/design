<ap-doc-page>

  <ap-doc-section title="Header - Website">
    <ap-demo>
      <ap-demo-group>
        <div class="header-controls">
          <ap-toggle
            label="Mobile view"
            [checked]="mobile()"
            size="sm"
            (checkedChange)="mobile.set(!mobile())"
          />
        </div>
        <div class="header-preview" [class.header-preview--mobile]="mobile()">
          <ap-header [mobile]="mobile()" />
        </div>
      </ap-demo-group>
    </ap-demo>
    <ap-code-block [code]="mobile() ? mobileCode : desktopCode" />
  </ap-doc-section>

</ap-doc-page>
