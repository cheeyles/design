<ap-doc-page
  description="Navigation elements for sidebar, header, and footer contexts."
>

  <ap-doc-section title="Nav Items - Dashboard sidebar - Nav item - Large">
    <ap-demo>
      <ap-demo-group [column]="true">
        <div class="nav-demo">
          <ap-sidenav-item icon="dashboard"    title="Overview"     [active]="activeNav() === 'Overview'"     (itemClick)="activeNav.set('Overview')" />
          <ap-sidenav-item icon="list_alt"     title="My Sales"     [active]="activeNav() === 'My Sales'"     (itemClick)="activeNav.set('My Sales')" />
          <ap-sidenav-item icon="shopping_bag" title="My Purchases" [active]="activeNav() === 'My Purchases'" (itemClick)="activeNav.set('My Purchases')" />
        </div>
      </ap-demo-group>
    </ap-demo>
  </ap-doc-section>

  <ap-doc-section title="Nav Items - Dashboard sidebar - Nav item - Icon">
    <ap-demo>
      <ap-demo-group [column]="true">
        <div class="icon-nav-demo">
          <button class="nav-icon-btn" [class.nav-icon-btn--active]="activeIcon() === 'dashboard'"    (click)="activeIcon.set('dashboard')">
            <span class="icon-outlined">dashboard</span>
          </button>
          <button class="nav-icon-btn" [class.nav-icon-btn--active]="activeIcon() === 'list_alt'"     (click)="activeIcon.set('list_alt')">
            <span class="icon-outlined">list_alt</span>
          </button>
          <button class="nav-icon-btn" [class.nav-icon-btn--active]="activeIcon() === 'shopping_bag'" (click)="activeIcon.set('shopping_bag')">
            <span class="icon-outlined">shopping_bag</span>
          </button>
        </div>
      </ap-demo-group>
    </ap-demo>
  </ap-doc-section>

  <ap-doc-section title="Nav Items - Dashboard sidebar - Nav item - with child - Large">
    <ap-demo>
      <ap-demo-group label="Click to expand" [column]="true">
        <div class="nav-demo">
          <ap-sidenav-item
            icon="settings"
            title="Parent"
            [expandable]="true"
            [expanded]="groupOpen()"
            (expandedChange)="groupOpen.set($event)"
          />
          @if (groupOpen()) {
            <button class="nav-sub-item">Child one</button>
            <button class="nav-sub-item nav-sub-item--active">Child two</button>
          }
        </div>
      </ap-demo-group>
    </ap-demo>
  </ap-doc-section>

  <ap-doc-section title="Nav Items - Sidebar item - Small">
    <ap-demo>
      <ap-demo-group [column]="true">
        <div class="small-nav-demo">
          <button class="ds-section-nav__item" [class.ds-section-nav__item--active]="activeSmall() === 'forecast'" (click)="activeSmall.set('forecast')">Item 1</button>
          <button class="ds-section-nav__item" [class.ds-section-nav__item--active]="activeSmall() === 'news'" (click)="activeSmall.set('news')">Item 2</button>
          <button class="ds-section-nav__item" [class.ds-section-nav__item--active]="activeSmall() === 'auctions'" (click)="activeSmall.set('auctions')">Item 3</button>
        </div>
      </ap-demo-group>
    </ap-demo>
  </ap-doc-section>

  <ap-doc-section title="Nav Items - Sidebar item - child - Small">
    <ap-demo>
      <ap-demo-group [column]="true">
        <div class="small-nav-demo">
          <button class="ds-section-nav__group-toggle" (click)="smallGroupOpen.update(v => !v)">
            Group label
            <span class="small-nav-chevron icon-outlined" [class.small-nav-chevron--open]="smallGroupOpen()">expand_more</span>
          </button>
          @if (smallGroupOpen()) {
            <button class="ds-section-nav__item ds-section-nav__item--child" [class.ds-section-nav__item--active]="activeSmall() === 'cattle'" (click)="activeSmall.set('cattle')">Item 1</button>
            <button class="ds-section-nav__item ds-section-nav__item--child" [class.ds-section-nav__item--active]="activeSmall() === 'sheep'" (click)="activeSmall.set('sheep')">Item 2</button>
          }
        </div>
      </ap-demo-group>
    </ap-demo>
  </ap-doc-section>

  <ap-doc-section title="Nav Items - Header item - With leading icon">
    <ap-demo>
      <ap-demo-group [column]="true">
        <div class="header-nav-demo header-nav-demo--leading">
          <button class="header-nav-btn" [class.header-nav-btn--active]="activeLeading() === 'forecast'" (click)="activeLeading.set('forecast')">
            <span class="header-nav-icon icon-outlined">chart_data</span>
            Price Discovery
          </button>
          <button class="header-nav-btn" [class.header-nav-btn--active]="activeLeading() === 'news'" (click)="activeLeading.set('news')">
            <span class="header-nav-icon icon-outlined">newspaper</span>
            News
          </button>
          <button class="header-nav-btn" [class.header-nav-btn--active]="activeLeading() === 'auctions'" (click)="activeLeading.set('auctions')">
            <span class="header-nav-icon icon-outlined">gavel</span>
            Auctions
          </button>
        </div>
      </ap-demo-group>
    </ap-demo>
  </ap-doc-section>

  <ap-doc-section title="Nav Items - Header item - With trailing icon">
    <ap-demo>
      <ap-demo-group [column]="true">
        <div class="header-nav-demo">
          <button class="header-nav-btn" [class.header-nav-btn--active]="activeTrailing() === 'livestock'" (click)="activeTrailing.set('livestock')">
            Livestock
            <span class="header-nav-icon icon-outlined">keyboard_arrow_down</span>
          </button>
          <button class="header-nav-btn" [class.header-nav-btn--active]="activeTrailing() === 'machinery'" (click)="activeTrailing.set('machinery')">
            Machinery
            <span class="header-nav-icon icon-outlined">keyboard_arrow_down</span>
          </button>
          <button class="header-nav-btn" [class.header-nav-btn--active]="activeTrailing() === 'service'" (click)="activeTrailing.set('service')">
            Services
            <span class="header-nav-icon icon-outlined">keyboard_arrow_down</span>
          </button>
        </div>
      </ap-demo-group>
    </ap-demo>
  </ap-doc-section>

  <ap-doc-section title="Nav Items - Footer item - link">
    <ap-demo>
      <ap-demo-group [column]="true">
        <div class="footer-links-demo">
          <a href="#" class="footer-link">About Us</a>
          <a href="#" class="footer-link">Careers</a>
          <a href="#" class="footer-link">Contact Us</a>
        </div>
      </ap-demo-group>
    </ap-demo>
  </ap-doc-section>

</ap-doc-page>
