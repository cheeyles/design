<nav aria-label="Breadcrumb">
  <ol class="bc-list">
    @for (crumb of crumbs; track $index) {
      <li class="bc-item">
        @if (crumb.href) {
          <a [routerLink]="crumb.href" class="bc-link">{{ crumb.label }}</a>
        } @else {
          <span class="bc-current" aria-current="page">{{ crumb.label }}</span>
        }
        @if (!$last) {
          <span class="bc-sep icon-outlined" aria-hidden="true">chevron_right</span>
        }
      </li>
    }
  </ol>
</nav>
