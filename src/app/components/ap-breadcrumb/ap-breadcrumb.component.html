<nav aria-label="Breadcrumb">
  <ol class="flex items-center overflow-x-auto text-brand-dark text-body-sm">
    @for (crumb of crumbs; track $index) {

      @if ($index > 0) {
        <li class="flex-shrink-0" aria-hidden="true">
          <span class="icon-outlined text-[16px]" style="color:var(--color-text-grey-dark)">chevron_right</span>
        </li>
      }

      <li>
        @if (crumb.href) {
          <a
            [routerLink]="crumb.href"
            class="hover:text-brand-primary hover:underline whitespace-nowrap"
          >{{ crumb.label }}</a>
        } @else {
          <span class="whitespace-nowrap" aria-current="page">{{ crumb.label }}</span>
        }
      </li>

    }
  </ol>
</nav>
