<div class="ds-panel">
  <div class="ds-card" style="padding:0;overflow:hidden">
    <div class="ds-group-header"><span class="ds-group-header__label">Elevation</span></div>
    @for (s of shadows; track s.token) {
      <div class="ds-token-row">
        <div class="ds-token-cell">
          <code class="ds-token-name">{{ s.label }}</code>
          <span class="ds-token-raw">{{ s.desc }}</span>
        </div>
        <div class="swatch-cell">
          <div class="shadow-swatch" [style.box-shadow]="'var(' + s.token + ')'"></div>
        </div>
        <div class="ds-token-preview"></div>
      </div>
    }
  </div>
</div>
