<!-- Mobile header -->
@if (mobile) {
  <header class="header-root">
    <div class="top-bar">
      <div class="flex items-center" style="gap:8px">
        <button class="icon-btn" aria-label="Menu">
          <span class="icon-outlined" style="color:var(--color-text-white)">menu</span>
        </button>
        <ap-logo variant="light" [iconOnly]="true" width="32px" />
      </div>
      <div class="flex items-center" style="gap:var(--spacing-xs)">
        <button class="icon-btn" aria-label="Favourites">
          <span class="icon-outlined" style="color:var(--color-text-white)">star</span>
        </button>
        <button class="icon-btn" aria-label="Notifications">
          <span class="icon-outlined" style="color:var(--color-text-white)">notifications</span>
        </button>
        <ap-avatar src="https://images.unsplash.com/photo-1504224357642-c87eacea1da4?q=80&w=200&auto=format&fit=crop" alt="User" [size]="32" [verified]="true" />
      </div>
    </div>
  </header>
}

<!-- Desktop header -->
@if (!mobile) {
  <header class="header-root">

    <!-- Top bar -->
    <div class="top-bar top-bar--desktop">

      <!-- Left: logo + search -->
      <div class="flex items-center" style="gap:var(--spacing-lg);flex-shrink:0;align-self:center">
        <ap-logo variant="light" width="175px" />
        @if (topbarTitle) {
          <span class="ds-topbar__title">{{ topbarTitle }}</span>
        }
        @if (variant === 'website') {
          <div class="search-pill">
            <span class="icon-outlined search-pill__icon">search</span>
            <input class="search-pill__input" type="search" placeholder="Search Upcoming Lots &amp; Auctions" />
          </div>
        }
      </div>

      <!-- Right: nav + icons -->
      <div class="flex items-stretch" style="gap:var(--spacing-md);flex-shrink:0">
        <!-- Top nav links -->
        <nav class="flex items-stretch" style="gap:8px">
          @for (link of topLinks; track link.label) {
            <button
              class="header-nav-btn"
              [class.header-nav-btn--active]="activeTop() === link.label"
              (click)="setTop(link.label)"
            >
              {{ link.label }}
              @if (link.dropdown) {
                <span class="header-nav-icon icon-outlined">expand_more</span>
              }
            </button>
          }
        </nav>

        <div class="divider" style="align-self:center"></div>

        <!-- Icon buttons -->
        <div class="flex items-center" style="gap:var(--spacing-sm);align-self:center">
          <button class="icon-btn" aria-label="Favourites">
            <span class="icon-outlined" style="color:var(--color-text-white)">star</span>
          </button>
          <button class="icon-btn" aria-label="Notifications">
            <span class="icon-outlined" style="color:var(--color-text-white)">notifications</span>
          </button>
        </div>
        <ap-avatar src="https://images.unsplash.com/photo-1504224357642-c87eacea1da4?q=80&w=200&auto=format&fit=crop" alt="User" [size]="40" [verified]="true" style="align-self:center" />
      </div>
    </div>

    <!-- Bottom bar -->
    @if (variant === 'website') {
    <div class="bottom-bar">
      <nav class="flex items-stretch" style="gap:8px">
        @for (link of bottomLeft; track link.label) {
          <button
            class="header-nav-btn"
            [class.header-nav-btn--active]="activeBottom() === link.label"
            (click)="setBottom(link.label)"
          >
            {{ link.label }}
            @if (link.dropdown) {
              <span class="header-nav-icon icon-outlined">keyboard_arrow_down</span>
            }
          </button>
        }
      </nav>
      <nav class="flex items-stretch" style="gap:8px">
        @for (item of bottomRight; track item.label) {
          <button
            class="header-nav-btn"
            [class.header-nav-btn--active]="activeBottom() === item.label"
            (click)="setBottom(item.label)"
          >
            <span class="header-nav-icon icon-outlined" style="color:var(--color-brand-primary)">{{ item.icon }}</span>
            {{ item.label }}
          </button>
        }
      </nav>
    </div>
    }

  </header>
}
