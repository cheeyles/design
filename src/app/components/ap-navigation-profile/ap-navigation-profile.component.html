<ap-dropdown align="right">

  <!-- Trigger: avatar circle -->
  <div trigger
    class="w-8 h-8 xl:w-10 xl:h-10 flex items-center justify-center
           bg-gray-50 cursor-pointer relative rounded-full"
  >
    @if (avatarUrl) {
      <img [src]="avatarUrl" class="w-full h-full rounded-full object-cover" alt="Profile" />
    } @else {
      <span class="icon-outlined text-3xl lg:text-4xl text-gray-500">account_circle</span>
    }

    <!-- Verified badge -->
    @if (verified) {
      <div class="verified-badge absolute bottom-0 right-0">
        <div class="flex items-center justify-center w-4 h-4 bg-positive rounded-full">
          <span class="icon-outlined text-[12px] text-white font-semibold">done</span>
        </div>
      </div>
    }
  </div>

  <!-- Dropdown panel content (projected by parent if needed) -->
  <ng-content />

</ap-dropdown>
