<div class="ds-panel">
  <div class="ds-card" style="padding:0;overflow:hidden">
    <div class="ds-group-header"><span class="ds-group-header__label">Transition</span></div>
    @for (t of transitions; track t.token) {
      <div class="ds-token-row">
        <div class="ds-token-cell">
          <code class="ds-token-name">{{ t.label }}</code>
          <span class="ds-token-raw">{{ t.raw }}</span>
        </div>
        <div class="swatch-cell">
          <div class="transition-demo" [style.transition]="'background-color var(' + t.token + ')'"></div>
        </div>
        <span class="ds-token-desc">{{ t.use }}</span>
      </div>
    }
  </div>
  <p class="ds-panel__hint">Hover each swatch to see the transition speed live.</p>
</div>
